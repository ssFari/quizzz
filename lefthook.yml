pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: bun tsc --noEmit

commit-msg:
  commands:
    conventional:
      run: 'head -1 "{1}" | grep -qE "^(feat|fix|chore|refactor|docs|test|style|perf|build|ci|revert)(\(.+\))?!?: .+"'
      fail_text: "Commit message must follow Conventional Commits — e.g. feat(auth): add github oauth"
